<!DOCTYPE html>
<html>
    <head>
    <title>
        Login Page
    </title>
    <script>
        function validate()
        {
            var username = document.getElementById("username").value.trim();
            var password = document.getElementById("password").value.trim();

            if(username == " " || password == " ")
            {
                alert("Both fields must contain data");
                return false;
            }
            if(password.length < 8 || password > 11)
            {
                alert("Password length must be between 8 and 12 character");
                return false;
            }
            if(username == "IET" && password == "IET123456")
            {
                window.location = "Home.html";
            }
            else
            {
                alert("Invalid Username or Password");
            }
        }

    </script>
    </head>

    <body>
        <h2>
            Login Form
        </h2>

        Username:
        <input type = "text" id = "username">
        <br><br>

        Password:
        <input type = "password" id = "password">
        <br><br>

        <button onclick="validate()">Login</button>
    </body>
</html>
